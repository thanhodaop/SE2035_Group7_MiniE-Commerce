<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name}">Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Mini E-commerce</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row">
        <div class="col-md-5">
            <img th:src="${product.imageUrl}" class="img-fluid rounded" alt="Ảnh sản phẩm">
        </div>
        <div class="col-md-7">
            <h1 th:text="${product.name}"></h1>
            <p class="text-muted" th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></p>
            <h3 class="text-danger" th:text="${#numbers.formatInteger(product.price, 0, 'POINT')} + ' đ'"></h3>
            <p th:text="${product.description}"></p>
            <p>Số lượng còn: <span th:text="${product.quantity}"></span></p>
            <a th:href="@{/products}" class="btn btn-secondary">← Quay lại danh sách</a>
        </div>
    </div>
</div>

</body>
</html>
