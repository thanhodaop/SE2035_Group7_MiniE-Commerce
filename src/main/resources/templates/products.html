<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Mini E-commerce</a>
    </div>
</nav>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Danh sách sản phẩm</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-primary">+ Thêm sản phẩm</a>
    </div>

    <form th:action="@{/products/search}" method="get" class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Tìm theo tên sản phẩm..." th:value="${keyword}">
        </div>
        <div class="col-md-3">
            <select name="priceRange" class="form-select">
                <option value="">Tất cả giá</option>
                <option value="under50"  th:selected="${priceRange == 'under50'}">Dưới 50.000 đ</option>
                <option value="50to100"  th:selected="${priceRange == '50to100'}">50.000 đ - 100.000 đ</option>
                <option value="100to200" th:selected="${priceRange == '100to200'}">100.000 đ - 200.000 đ</option>
                <option value="200to500" th:selected="${priceRange == '200to500'}">200.000 đ - 500.000 đ</option>
                <option value="500to1m"  th:selected="${priceRange == '500to1m'}">500.000 đ - 1.000.000 đ</option>
                <option value="1mto2m"   th:selected="${priceRange == '1mto2m'}">1.000.000 đ - 2.000.000 đ</option>
                <option value="2mto5m"   th:selected="${priceRange == '2mto5m'}">2.000.000 đ - 5.000.000 đ</option>
                <option value="over5m"   th:selected="${priceRange == 'over5m'}">Trên 5.000.000 đ</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
        </div>
        <div class="col-md-2">
            <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Xoá lọc</a>
        </div>
    </form>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Mô tả</th>
            <th>Danh mục</th>
            <th>Số lượng</th>
            <th sec:authorize="hasRole('ADMIN')">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td>
                <img th:src="${product.imageUrl}" alt="Ảnh" style="width: 60px; height: 60px; object-fit: cover;">
            </td>
            <td th:text="${product.name}"></td>
            <td>
                <span th:if="${product.onSale}">
                    <span class="text-muted text-decoration-line-through"
                          th:text="${#numbers.formatInteger(product.price, 0, 'POINT')} + ' đ'"></span>
                    <span class="text-danger fw-bold ms-1"
                          th:text="${#numbers.formatInteger(product.discountedPrice, 0, 'POINT')} + ' đ'"></span>
                    <span class="badge bg-danger ms-1" th:text="'-' + ${product.discountPercent} + '%'"></span>
                </span>
                <span th:unless="${product.onSale}"
                      th:text="${#numbers.formatInteger(product.price, 0, 'POINT')} + ' đ'"></span>
            </td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td th:text="${product.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-warning">Sửa</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Bạn chắc chắn muốn xoá?')">Xoá</a>
            </td>
        </tr>
        <tr th:if="${products.isEmpty()}">
            <td colspan="8" class="text-center text-muted">Không tìm thấy sản phẩm nào.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
