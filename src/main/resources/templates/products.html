<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Mini E-commerce</a>
    </div>
</nav>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Danh sách sản phẩm</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-primary">+ Thêm sản phẩm</a>
    </div>

    <!-- Thanh tìm kiếm + lọc giá -->
    <form th:action="@{/products/search}" method="get" class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Tìm theo tên sản phẩm..." th:value="${keyword}">
        </div>
        <div class="col-md-2">
            <input type="number" name="minPrice" class="form-control"
                   placeholder="Giá từ" th:value="${minPrice}">
        </div>
        <div class="col-md-2">
            <input type="number" name="maxPrice" class="form-control"
                   placeholder="Giá đến" th:value="${maxPrice}">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
        </div>
        <div class="col-md-1">
            <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Xoá</a>
        </div>
    </form>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Mô tả</th>
            <th>Danh mục</th>
            <th>Số lượng</th>
            <th sec:authorize="hasRole('ADMIN')">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td>
                <img th:src="${product.imageUrl}" alt="Ảnh" style="width: 60px; height: 60px; object-fit: cover;">
            </td>
            <td th:text="${product.name}"></td>
            <td th:text="${#numbers.formatInteger(product.price, 0, 'POINT')} + ' đ'"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td th:text="${product.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-warning">Sửa</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Bạn chắc chắn muốn xoá?')">Xoá</a>
            </td>
        </tr>
        <tr th:if="${products.isEmpty()}">
            <td colspan="8" class="text-center text-muted">Không tìm thấy sản phẩm nào.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
