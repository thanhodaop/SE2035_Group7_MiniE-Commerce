<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">
    <h1 class="mb-4">Thông tin sản phẩm</h1>

    <form th:action="@{/products}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input type="text" class="form-control" th:field="*{name}">
        </div>

        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input type="number" step="0.01" class="form-control" th:field="*{price}">
        </div>

        <div class="mb-3">
            <label class="form-label">Phần trăm giảm giá (%)</label>
            <input type="number" min="0" max="100" class="form-control" th:field="*{discountPercent}"
                   placeholder="Để trống hoặc 0 nếu không giảm giá">
        </div>

        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Đường dẫn ảnh (URL)</label>
            <input type="text" class="form-control" th:field="*{imageUrl}">
        </div>

        <div class="mb-3">
            <label class="form-label">Số lượng</label>
            <input type="number" class="form-control" th:field="*{quantity}">
        </div>

        <div class="mb-3">
            <label class="form-label">Danh mục</label>
            <select class="form-select" th:field="*{category}">
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/products}" class="btn btn-secondary">Huỷ</a>
    </form>
</div>

</body>
</html>
