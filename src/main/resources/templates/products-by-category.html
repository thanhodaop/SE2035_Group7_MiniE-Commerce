<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm theo danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Mini E-commerce</a>
    </div>
</nav>

<div class="container my-5">
    <h1 class="mb-4" th:text="'Danh mục: ' + ${category.name}">Danh mục</h1>

    <div class="row">
        <div class="col-md-3 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <img th:src="${product.imageUrl}" class="card-img-top" alt="Ảnh"
                     style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}"></h5>
                    <p class="card-text" th:text="${product.price} + ' đ'"></p>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-primary">Xem chi tiết</a>
                </div>
            </div>
        </div>
    </div>

    <p th:if="${products.isEmpty()}" class="text-muted">Chưa có sản phẩm nào trong danh mục này.</p>
</div>

</body>
</html>
